<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surat Sehat - Sistem Klinik</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">🏥 Sistem Klinik</div>
    <div class="nav-menu">
      <a href="dashboard.html">Dashboard</a>
      <a href="surat-sehat.html">Surat Sehat</a>
      <a href="surat-sakit.html">Surat Sakit</a>
      <a href="kwitansi.html">Kwitansi</a>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
  </nav>

  <div class="container">
    <h1>📄 Pendaftaran Surat Sehat</h1>
    <p class="subtitle">Isi data pasien untuk membuat surat sehat</p>

    <div class="form-card">
      <!-- NOMOR OTOMATIS -->
      <div class="nomor-box">
        <span>Nomor Surat:</span>
        <strong id="preview-nomor">SS-2025-06-0001</strong>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Nama Lengkap *</label>
          <input type="text" id="nama" placeholder="Nama pasien">
        </div>
        <div class="form-group">
          <label>NIK / No. KTP *</label>
          <input type="text" id="nik" placeholder="16 digit NIK">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Tanggal Lahir</label>
          <input type="date" id="tgl-lahir">
        </div>
        <div class="form-group">
          <label>Jenis Kelamin</label>
          <select id="jk">
            <option value="">-- Pilih --</option>
            <option value="Laki-laki">Laki-laki</option>
            <option value="Perempuan">Perempuan</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Alamat</label>
        <textarea id="alamat" placeholder="Alamat lengkap pasien" rows="2"></textarea>
      </div>

      <div class="form-group">
        <label>Keperluan Surat</label>
        <input type="text" id="keperluan" placeholder="Contoh: Melamar kerja, keperluan sekolah, dll">
      </div>

      <div class="form-group">
        <label>Tanggal Periksa</label>
        <input type="date" id="tgl-periksa">
      </div>

      <div class="form-group">
        <label>Keterangan Tambahan</label>
        <textarea id="keterangan" placeholder="Opsional" rows="2"></textarea>
      </div>

      <div class="btn-group">
        <button onclick="simpanSuratSehat()" class="btn-primary">💾 Simpan & Cetak</button>
        <button onclick="resetForm()" class="btn-secondary">🔄 Reset</button>
      </div>

      <p id="pesan-sukses" class="pesan-sukses" style="display:none;">
        ✅ Data berhasil disimpan!
      </p>
    </div>

    <!-- TABEL RIWAYAT -->
    <div class="table-box" style="margin-top: 32px;">
      <h2>Riwayat Surat Sehat Bulan Ini</h2>
      <table>
        <thead>
          <tr>
            <th>Nomor</th>
            <th>Nama</th>
            <th>NIK</th>
            <th>Keperluan</th>
            <th>Tanggal</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tabel-ss"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nomor.js"></script>
  <script src="js/surat-sehat.js"></script>
</body>
</body>
</html>
