<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kwitansi - Sistem Klinik</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- POPUP SUKSES -->
<div id="popup-sukses" class="popup-overlay" style="display:none;">
  <div class="popup-box">
    <div class="popup-icon">✅</div>
    <h3 class="popup-title">Berhasil!</h3>
    <p class="popup-msg" id="popup-msg">Data berhasil disimpan!</p>
    <button id="btn-popup-ok" onclick="tutupPopup()" class="btn-primary" 
     style="width: auto; padding: 10px 32px;">OK</button>
  </div>
</div>

  <nav class="navbar">
    <div class="nav-brand">
  <img src="images/logo.png" alt="Logo">
  UPTD Puskesmas Sukmajaya
</div>
    <div class="nav-menu">
      <a href="dashboard.html">Dashboard</a>
      <a href="surat-sehat.html">Surat Sehat</a>
      <a href="surat-sakit.html">Surat Sakit</a>
      <a href="kwitansi.html">Kwitansi</a>
      <button onclick="logout()" class="btn-logout">Logout</button>
    </div>
  </nav>

  <div class="container">
    <h1>🧾 Penomoran Kwitansi</h1>
    <p class="subtitle">Isi data pembayaran pasien</p>

    <div class="form-card">
      <div class="nomor-box">
        <span>Nomor Kwitansi:</span>
        <strong id="preview-nomor">KW-2025-06-0001</strong>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Nama Pasien *</label>
          <input type="text" id="nama" placeholder="Nama pasien">
        </div>
        <div class="form-group">
          <label>No. Referensi Surat</label>
          <input type="text" id="ref-surat" placeholder="Contoh: SS-2025-06-0001">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Jenis Layanan</label>
          <select id="layanan">
            <option value="">-- Pilih --</option>
            <option value="KTP Non Depok">KTP Non Depok</option>
            <option value="Surat Sehat KTP Depok">Surat Sehat KTP Depok</option>
            <option value="Surat Sehat KTP Non Depok">Surat Sehat KTP Non Depok</option>
            <option value="Laboratorium">Laboratorium</option>
            <option value="KTP Non Depok">KTP Non Depok</option>
            <option value="Tindakan IGD">Tindakan IGD</option>
            <option value="Tindakan Poli Gigi">Tindakan Poli Gigi</option>
            <option value="Tindakan Poli KIA">Tindakan Poli KIA</option>
            <option value="Tindakan Poli PONED">Tindakan PONED</option>
            <option value="Konsultasi Psikolog KTP Depok">Konsultasi Psikolog KTP Depok</option>
            <option value="Konsultasi Psikolog KTP Non Depok">Konsultasi Psikolog KTP Non Depok</option>
            <option value="Lainnya">Lainnya</option>
          </select>
        </div>
        <div class="form-group">
          <label>Jumlah Bayar (Rp) *</label>
          <input type="number" id="jumlah" placeholder="Contoh: 50000" min="0">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Metode Pembayaran</label>
          <select id="metode">
            <option value="Tunai">Tunai</option>
            <option value="Transfer">Transfer</option>
            <option value="BPJS">BPJS</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tanggal Bayar</label>
          <input type="date" id="tgl-bayar">
        </div>
      </div>

      <div class="form-group">
        <label>Keterangan</label>
        <textarea id="keterangan" placeholder="Opsional" rows="2"></textarea>
      </div>

      <div class="btn-group">
        <button onclick="simpanKwitansi()" class="btn-primary">💾 Simpan & Cetak</button>
        <button onclick="resetForm()" class="btn-secondary">🔄 Reset</button>
      </div>

      <p id="pesan-sukses" class="pesan-sukses" style="display:none;">
        ✅ Data berhasil disimpan!
      </p>
    </div>

    <div class="table-box" style="margin-top: 32px;">
      <h2>Riwayat Kwitansi Bulan Ini</h2>
      <table>
        <thead>
          <tr>
            <th>Nomor</th>
            <th>Nama</th>
            <th>Layanan</th>
            <th>Jumlah</th>
            <th>Tanggal</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tabel-kw"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nomor.js"></script>
  <script src="js/kwitansi.js"></script>
</body>
</body>
</html>
